<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESSENCE - Moda Contemporánea</title>
    <meta name="description" content="Descubre la nueva colección de moda contemporánea" />
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4420698611954762"
     crossorigin="anonymous"></script>
     <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4420698611954762"
     crossorigin="anonymous"></script>
  </head>
  <body>
    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1>ESSENCE <span class="glow">2024</span></h1>
        <p>Donde el estilo encuentra su esencia</p>
        <div class="date-container">
          <span class="star">★</span>
          <span>Nueva Colección</span>
          <span class="star">★</span>
        </div>
        <button class="cta-button">Descubre más</button>
      </div>
    </section>

    <!-- Collection Section -->
    <section class="artists">
      <div class="container">
        <div class="section-header">
          <span class="icon">✨</span>
          <h2>Colección Destacada</h2>
        </div>
        <div class="artists-grid">
          <div class="artist-card">
            <div class="artist-overlay"></div>
            <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b" alt="Ropa Casual">
            <div class="artist-info">
              <h3>Casual Chic</h3>
              <p>Colección Primavera</p>
            </div>
          </div>
          <div class="artist-card">
            <div class="artist-overlay"></div>
            <img src="https://images.unsplash.com/photo-1445205170230-053b83016050" alt="Ropa Elegante">
            <div class="artist-info">
              <h3>Elegancia Natural</h3>
              <p>Colección Verano</p>
            </div>
          </div>
          <div class="artist-card">
            <div class="artist-overlay"></div>
            <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d" alt="Ropa Urbana">
            <div class="artist-info">
              <h3>Urban Style</h3>
              <p>Colección Otoño</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Contact Section -->
    <section class="contact">
      <div class="container">
        <h2>Únete a nuestra comunidad</h2>
        <p>Suscríbete para recibir las últimas tendencias, descuentos exclusivos y más</p>
        <form id="newsletter-form">
          <div class="form-group">
            <input type="email" id="email" placeholder="Tu email" required>
            <button type="submit">Suscribirse</button>
          </div>
        </form>
      </div>
    </section>

    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4420698611954762"
     crossorigin="anonymous"></script>
  </body>
</html>
